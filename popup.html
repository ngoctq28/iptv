<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8"/>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{width:280px;padding:16px;font-family:'Segoe UI',system-ui,sans-serif;background:#202020;color:#f5f5f5;font-size:13px}
h2{font-size:15px;margin-bottom:8px;display:flex;align-items:center;gap:6px}
p{color:#a0a0a0;line-height:1.5;margin-bottom:12px}
.steps{list-style:none;counter-reset:s}
.steps li{counter-increment:s;padding:6px 0;color:#ccc;display:flex;align-items:flex-start;gap:8px}
.steps li::before{content:counter(s);background:#60a5fa;color:#fff;width:20px;height:20px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:600;flex-shrink:0}
.highlight{color:#60a5fa;font-weight:600}
.credit{margin-top:12px;text-align:center;font-size:11px;color:#666}
.credit a{color:#60a5fa;text-decoration:none}
.credit a:hover{text-decoration:underline}
</style>
</head>
<body>
<h2>&#128250; Sidebar Player</h2>
<p>To use, open in the sidebar:</p>
<ol class="steps">
  <li><span class="highlight">Right-click</span> on this extension icon</li>
  <li>Select <span class="highlight">&ldquo;Open side panel&rdquo;</span></li>
  <li>The sidebar will appear &mdash; click a channel to watch!</li>
</ol>
<p class="credit">Made by <a href="https://github.com/vuviett47" target="_blank">vuviett47</a></p>
</body>
</html>
