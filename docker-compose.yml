services:
  iptv:
    image: ngoctq28/iptv:latest   # tag used when pulling a pre-built image
    build:
      context: .                # build from the local Dockerfile
      dockerfile: Dockerfile
    container_name: iptv
    restart: unless-stopped
    ports:
      - "${PORT:-3000}:${PORT:-3000}"   # host:container — override with PORT env var
    environment:
      - NODE_ENV=production
      - PORT=${PORT:-3000}
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:${PORT:-3000}/"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
