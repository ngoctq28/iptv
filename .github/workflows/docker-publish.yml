name: Build & Push Docker Image

on:
  push:
    branches:
      - main          # trigger on every push to main
    tags:
      - 'v*'          # also trigger on version tags like v1.0.0
  workflow_dispatch:  # allow manual trigger from GitHub UI

env:
  IMAGE_NAME: ${{ secrets.DOCKERHUB_USERNAME }}/iptv

jobs:
  build-and-push:
    name: Build & Push to Docker Hub
    runs-on: ubuntu-latest

    steps:
      # 1. Check out source code
      - name: Checkout repository
        uses: actions/checkout@v4

      # 2. Set up QEMU for multi-platform builds (amd64 + arm64)
      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      # 3. Set up Docker Buildx (required for multi-platform & cache)
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      # 4. Log in to Docker Hub
      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      # 5. Derive image tags automatically
      #    - push to main        → latest
      #    - push tag v1.2.3     → 1.2.3  +  latest
      - name: Extract Docker metadata (tags & labels)
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.IMAGE_NAME }}
          tags: |
            type=ref,event=branch
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=raw,value=latest,enable={{is_default_branch}}

      # 6. Build and push (uses layer cache from GitHub Actions cache)
      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      # 7. Print the digest so it's visible in the run summary
      - name: Print image digest
        run: echo "Pushed ${{ env.IMAGE_NAME }} → ${{ steps.meta.outputs.tags }}"
